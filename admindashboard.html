<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meridian Fleet · Admin Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F2EFE9;
      color: #1B2430;
      -webkit-font-smoothing: antialiased;
    }
    :root {
      --bg: #F2EFE9;
      --surface: #FFFFFF;
      --surface-2: #EFEAE0;
      --border: rgba(27,36,48,0.14);
      --text: #1B2430;
      --text-dim: rgba(27,36,48,0.65);
      --text-dimmer: rgba(27,36,48,0.45);
      --accent: #E8A33D;
      --accent-soft: rgba(232,163,61,0.15);
      --accent-glow: rgba(232,163,61,0.3);
      --green: #4A7A5C;
      --amber: #C6862A;
      --red: #B0492F;
      --slate: #6B7280;
      --display: 'Space Grotesk', sans-serif;
      --mono: 'IBM Plex Mono', monospace;
      --ease: cubic-bezier(.22,1,.36,1);
    }
    @media (prefers-reduced-motion: reduce){
      *{ animation-duration:.001ms !important; transition-duration:.001ms !important; }
    }
    ::selection{ background:var(--accent); color:#1B2430; }
    .dashboard-root { display: flex; min-height: 100vh; width: 100%; max-width: 100vw; position:relative; }
    .dashboard-root::before{
      content:""; position:fixed; inset:0; z-index:0; pointer-events:none;
      background-image:radial-gradient(circle at 20% 30%, rgba(232,163,61,0.05) 0%, transparent 60%),
                       radial-gradient(circle at 80% 70%, rgba(232,163,61,0.04) 0%, transparent 50%);
    }
    .sidebar-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      z-index: 40; display: none; backdrop-filter: blur(4px);
    }
    .sidebar-overlay.show { display: block; animation: fadeIn .25s var(--ease); }
    @keyframes fadeIn{ from{ opacity:0; } to{ opacity:1; } }
    .sidebar {
      width: 260px; flex-shrink: 0; background: var(--surface);
      border-right: 1px solid var(--border); display: flex; flex-direction: column;
      padding: 20px 16px 16px; position: fixed; left: 0; top: 0;
      height: 100vh; overflow-y: auto; z-index: 30;
      backdrop-filter: blur(8px);
    }
    .sidebar-header { display: flex; align-items: center; justify-content: center; margin-bottom: 24px; padding: 0 4px; position: relative; }
    .brand { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; }
    .sidebar-logo {
      display: block; height: 40px; width: auto; max-width: 100%;
      object-fit: contain; transition: transform .25s ease;
    }
    .sidebar-logo:hover { transform: scale(1.03); }
    .close-btn {
      display: none; background: none; border: none; color: var(--text-dim);
      font-size: 18px; padding: 4px 8px; cursor:pointer;
      position: absolute; right: 0; top: 50%; transform: translateY(-50%);
    }
    .sidebar-section-label {
      font-family:var(--mono); font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
      color: var(--text-dimmer); text-transform: uppercase; margin: 14px 8px 8px;
    }
    .sidebar-nav { display: flex; flex-direction: column; gap: 2px; }
    .nav-item {
      display: flex; align-items: center; gap: 12px;
      background: none; border: none; width: 100%;
      padding: 10px 12px; border-radius: 10px;
      color: var(--text-dim); font-size: 13.5px; font-weight: 500;
      text-align: left; transition: all .2s ease; position: relative; cursor:pointer;
    }
    .nav-item:hover { background: rgba(232,163,61,0.08); color: var(--text); transform:translateX(2px); }
    .nav-item.nav-active { background: var(--accent-soft); color: var(--accent); font-weight: 600; box-shadow: 0 0 12px var(--accent-glow); }
    .nav-icon { font-size: 15px; width: 18px; text-align: center; flex-shrink: 0; }
    .nav-badge { margin-left: auto; background: var(--accent); color: #1B2430; font-family:var(--mono); font-size: 10px; font-weight: 700; padding: 1px 7px; border-radius: 999px; }
    .sidebar-user {
      display: flex; align-items: center; gap: 10px;
      padding: 10px; margin-top: 16px; margin-bottom: 4px;
      border-radius: 10px; background: var(--surface-2); border: 1px solid var(--border);
    }
    .sidebar-user-avatar {
      width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
      background: var(--accent-soft); color: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-family:var(--mono); font-size: 13px; font-weight: 800; text-transform: uppercase;
    }
    .sidebar-user-info { min-width: 0; flex: 1; }
    .sidebar-user-name { font-size: 12.5px; font-weight: 700; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-transform:capitalize; }
    .sidebar-user-email { font-size: 11px; color: var(--text-dimmer); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .logout-full-btn {
      margin-top: 8px; width: 100%; padding: 11px; border-radius: 10px;
      background: rgba(176,73,47,0.08); border: 1px solid rgba(176,73,47,0.25);
      color: #96402A; font-family:var(--mono); font-size: 12px; font-weight: 700; letter-spacing:.03em; text-transform:uppercase;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background .2s ease; text-decoration: none; cursor: pointer;
    }
    .logout-full-btn:hover { background: rgba(176,73,47,0.15); }
    .main-content { flex: 1; min-width: 0; max-width: 100%; display: flex; flex-direction: column; margin-left: 260px; position:relative; z-index:1; }
    .topbar {
      position: sticky; top: 0; z-index: 25;
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; padding: 10px 24px;
      background: rgba(242,239,233,0.88); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      flex-wrap: nowrap; min-height: 60px;
    }
    .topbar-left { display: flex; align-items: center; gap: 14px; min-width: 0; flex-shrink: 1; }
    .hamburger {
      display: none; flex-direction: column; justify-content: center; gap: 4px;
      width: 36px; height: 36px; border-radius: 8px;
      background: var(--surface-2); border: 1px solid var(--border);
      align-items: center; flex-shrink: 0; cursor:pointer;
    }
    .hamburger span { width: 16px; height: 2px; background: var(--text); border-radius: 2px; }
    .page-title { min-width: 0; display: flex; align-items: baseline; gap: 12px; white-space: nowrap; }
    .page-title h1 {
      font-family:var(--display); text-transform:uppercase; letter-spacing:-.01em; font-size: 20px; font-weight: 700; margin: 0;
      background: linear-gradient(135deg, #1B2430 0%, #6B7280 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; white-space: nowrap;
    }
    .page-title p { font-size: 12px; color: var(--text-dim); margin: 0; white-space: nowrap; -webkit-text-fill-color: var(--text-dim); }
    .topbar-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; margin-left: auto; }
    .search-box { display: flex; align-items: center; gap: 6px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; min-width: 0; }
    .search-box input { background: none; border: none; outline: none; color: var(--text); font-size: 12px; width: 150px; max-width: 100%; min-width: 60px; }
    .search-box input::placeholder { color: var(--text-dimmer); font-size: 11px; }
    .search-icon { font-size: 12px; opacity: 0.7; }
    .icon-btn {
      position: relative; width: 34px; height: 34px; border-radius: 8px;
      background: var(--surface-2); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center; font-size: 14px;
      flex-shrink: 0; cursor:pointer; transition:all .2s ease;
    }
    .icon-btn:hover{ border-color:var(--accent); transform:translateY(-1px); box-shadow:0 0 12px var(--accent-glow); }
    .notif-dot {
      position: absolute; top: 6px; right: 6px; width: 6px; height: 6px;
      border-radius: 50%; background: var(--red); border: 1.5px solid var(--surface-2);
      animation: notifPulse 2.2s ease-in-out infinite;
    }
    @keyframes notifPulse{ 0%,100%{ box-shadow:0 0 0 0 rgba(176,73,47,.5); } 50%{ box-shadow:0 0 0 4px rgba(176,73,47,0); } }
    .topbar-user { position: relative; flex-shrink: 0; }
    .topbar-user-btn {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 999px; padding: 3px 10px 3px 3px;
      transition: border-color .2s ease; cursor:pointer;
    }
    .topbar-user-btn:hover { border-color:var(--accent); }
    .topbar-user-avatar {
      width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
      background: var(--accent); color: #1B2430;
      display: flex; align-items: center; justify-content: center;
      font-family:var(--mono); font-size: 11px; font-weight: 800; text-transform: uppercase;
    }
    .topbar-user-name { font-size: 11.5px; font-weight: 600; color: var(--text); max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-transform:capitalize; }
    .topbar-user-caret { font-size: 9px; color: var(--text-dimmer); }
    .topbar-user-menu {
      position: absolute; top: calc(100% + 8px); right: 0; width: 220px;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 12px; padding: 8px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.6);
      opacity: 0; visibility: hidden; transform: translateY(-6px);
      transition: opacity .2s var(--ease), transform .2s var(--ease), visibility .2s ease;
      z-index: 60;
    }
    .topbar-user.open .topbar-user-menu { opacity: 1; visibility: visible; transform: translateY(0); }
    .topbar-user-menu-email { padding: 8px 10px 10px; border-bottom: 1px solid var(--border); margin-bottom: 6px; }
    .topbar-user-menu-email .label { font-family:var(--mono); font-size: 9px; font-weight: 700; color: var(--text-dimmer); text-transform: uppercase; letter-spacing: .05em; }
    .topbar-user-menu-email .value { font-size: 11.5px; font-weight: 600; color: var(--text); margin-top: 2px; word-break: break-all; }
    .topbar-user-menu-item {
      display: flex; align-items: center; gap: 9px; width: 100%;
      padding: 8px 10px; border-radius: 8px;
      background: none; border: none; text-align: left;
      font-size: 11.5px; font-weight: 600; color: var(--text-dim);
      transition: background .15s ease, color .15s ease; cursor:pointer;
    }
    .topbar-user-menu-item:hover { background: rgba(232,163,61,0.08); color: var(--text); }
    .topbar-user-menu-item.danger:hover { background: rgba(176,73,47,0.15); color: #96402A; }

    .content-area { padding: 24px 28px 48px; min-width: 0; max-width: 100%; overflow-x: hidden; }
    .hero-banner {
      position: relative; border-radius: 16px; overflow: hidden; margin-bottom: 20px;
      border: 1px solid var(--border); min-height: 150px; display: flex; align-items: center;
      background: linear-gradient(120deg, rgba(10,13,18,.92), rgba(10,13,18,.75));
    }
    .hero-banner-inner { padding: 26px 30px; max-width: 560px; }
    .hero-eyebrow { font-family:var(--mono); font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
    .hero-banner h2 { font-family:var(--display); font-size: 22px; font-weight: 800; margin-bottom: 6px; color: #F2EFE9; }
    .hero-banner p { font-size: 13px; color: rgba(242,239,233,0.82); line-height: 1.5; }
    .stats-grid { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 16px; margin-bottom: 20px; }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 18px 18px 16px; min-width: 0;
      transition: all .25s ease;
      opacity:0; transform:translateY(14px); animation: cardPop .5s var(--ease) forwards;
    }
    .stat-card[data-aos] { opacity: 0; animation: none; }
    .stats-grid .stat-card:nth-child(1){ animation-delay:.03s; }
    .stats-grid .stat-card:nth-child(2){ animation-delay:.09s; }
    .stats-grid .stat-card:nth-child(3){ animation-delay:.15s; }
    .stats-grid .stat-card:nth-child(4){ animation-delay:.21s; }
    @keyframes cardPop{ to{ opacity:1; transform:translateY(0); } }
    .stat-card:hover { border-color:var(--accent); transform:translateY(-3px); box-shadow:0 8px 24px rgba(232,163,61,0.1); }
    .stat-accent { border-color:rgba(232,163,61,0.35); background:linear-gradient(145deg, rgba(232,163,61,0.07), var(--surface) 70%); }
    .stat-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .stat-icon { font-size: 18px; filter: drop-shadow(0 0 6px var(--accent-glow)); }
    .stat-delta { font-family:var(--mono); font-size: 10.5px; font-weight: 700; padding: 2px 8px; border-radius: 999px; }
    .stat-delta.up { color: var(--green); background: rgba(74,122,92,0.12); }
    .stat-value { font-family:var(--display); font-size: 26px; font-weight: 700; letter-spacing: -0.01em; }
    .stat-label { font-size: 12.5px; color: var(--text-dim); margin-top: 4px; }
    .stat-bar { height: 5px; background: rgba(27,36,48,0.06); border-radius: 999px; margin-top: 12px; overflow: hidden; }
    .stat-bar-fill { height: 100%; width:0; background: linear-gradient(90deg, var(--accent), #F2C572); border-radius: 999px; transition: width 1.1s var(--ease) .3s; }
    .mid-grid { display: grid; grid-template-columns: 1.7fr 1fr; gap: 16px; margin-bottom: 16px; align-items: start; }
    .bottom-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; align-items: start; }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 20px; margin-bottom: 16px; min-width: 0;
      opacity:0; transform:translateY(14px); animation: cardPop .5s var(--ease) .1s forwards;
    }
    .card[data-aos] { opacity: 0; animation: none; }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
    .card-title { font-family:var(--display); text-transform:uppercase; letter-spacing:.005em; font-size: 15px; font-weight: 700; margin: 0; color: #1B2430; }
    .card-sub { font-size: 12px; color: var(--text-dim); margin: 3px 0 0; }
    .table-wrapper { overflow-x: auto; max-width: 100%; -webkit-overflow-scrolling: touch; }
    .runs-table { width: 100%; border-collapse: collapse; min-width: 600px; }
    .runs-table th {
      text-align: left; font-family:var(--mono); font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.05em; color: var(--text-dimmer);
      padding: 0 10px 10px; border-bottom: 1px solid var(--border);
    }
    .runs-table td { padding: 12px 10px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
    .runs-table tr:last-child td { border-bottom: none; }
    .runs-table tbody tr { transition: background .15s ease; cursor:pointer; }
    .runs-table tbody tr:hover { background: rgba(232,163,61,0.05); }
    .t-name { font-weight: 600; font-size: 13px; }
    .t-sub { font-size: 11.5px; color: var(--text-dimmer); margin-top: 2px; }
    .type-col { color: var(--text-dim); }
    .date-col { color: var(--text-dim); white-space: nowrap; }
    .budget-col { font-weight: 700; white-space: nowrap; font-family:var(--mono); font-size:12.5px; }
    .region-tag { font-family:var(--mono); font-size: 10.5px; font-weight: 700; padding: 3px 9px; border-radius: 999px; border: 1px solid; white-space: nowrap; }
    .status-badge { font-family:var(--mono); font-size: 10.5px; font-weight: 700; padding: 4px 10px; border-radius: 999px; white-space: nowrap; text-transform:uppercase; letter-spacing:.02em; }
    .status-active { background: rgba(74,122,92,0.12); color: #3F6B4C; }
    .status-field { background: rgba(198,134,42,0.12); color: #B4791F; }
    .status-complete { background: rgba(107,114,128,0.15); color: #6B7280; }
    .status-review { background: rgba(61,90,115,0.14); color: #3D5A73; }
    .progress-wrap { display: flex; align-items: center; gap: 8px; min-width: 100px; }
    .progress-bar { flex: 1; height: 6px; background: rgba(27,36,48,0.06); border-radius: 999px; overflow: hidden; }
    .progress-fill { height: 100%; width:0; background: linear-gradient(90deg, var(--accent), #F2C572); border-radius: 999px; transition:width 1s var(--ease) .2s; }
    .progress-pct { font-family:var(--mono); font-size: 11px; color: var(--text-dim); flex-shrink: 0; }
    .activity-list { display: flex; flex-direction: column; gap: 4px; padding: 0; margin: 0; }
    .activity-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 6px; border-radius: 10px; transition: background .15s ease; cursor:pointer; }
    .activity-item:hover { background: rgba(232,163,61,0.05); }
    .act-icon { font-size: 17px; flex-shrink: 0; line-height: 1.4; }
    .act-body { flex: 1; min-width: 0; }
    .act-text { font-size: 13px; margin: 0; line-height: 1.5; word-wrap: break-word; }
    .act-time { font-family:var(--mono); font-size: 11px; color: var(--text-dimmer); margin-top: 4px; display: block; }
    .team-list { display: flex; flex-direction: column; gap: 4px; padding: 0; margin: 0; }
    .team-item { display: flex; align-items: center; gap: 12px; padding: 10px 6px; border-radius: 10px; transition: background .15s ease; cursor:pointer; }
    .team-item:hover { background: rgba(232,163,61,0.05); }
    .member-avatar {
      position: relative; width: 38px; height: 38px; border-radius: 50%;
      background: var(--surface-2); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-family:var(--mono); font-size: 12px; font-weight: 700; color: var(--accent); flex-shrink: 0;
    }
    .online-dot { position: absolute; bottom: -1px; right: -1px; width: 10px; height: 10px; border-radius: 50%; border: 2px solid var(--surface); }
    .dot-active { background: var(--green); }
    .dot-away { background: var(--amber); }
    .member-info { flex: 1; min-width: 0; }
    .member-name { font-size: 13px; font-weight: 600; }
    .member-role { font-size: 11.5px; color: var(--text-dimmer); margin-top: 1px; }
    .member-projects { text-align: center; flex-shrink: 0; }
    .proj-count { display: block; font-family:var(--display); font-size: 15px; color: var(--accent); }
    .proj-label { display: block; font-family:var(--mono); font-size: 9.5px; color: var(--text-dimmer); text-transform:uppercase; }
    .milestone-list { display: flex; flex-direction: column; padding: 0; margin: 0; }
    .milestone-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 6px; border-radius: 10px; position: relative; transition: background .15s ease; cursor:pointer; }
    .milestone-item:hover { background: rgba(232,163,61,0.05); }
    .ms-date { width: 34px; flex-shrink: 0; text-align: center; }
    .ms-date span { display: block; }
    .ms-date span:first-child { font-family:var(--mono); font-size: 9.5px; font-weight: 700; color: var(--accent); text-transform: uppercase; }
    .ms-date span:last-child { font-family:var(--display); font-size: 16px; }
    .ms-line { width: 2px; align-self: stretch; display: flex; justify-content: center; flex-shrink: 0; }
    .ms-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); margin-top: 4px; }
    .ms-body { flex: 1; min-width: 0; }
    .ms-event { font-size: 13px; font-weight: 600; }
    .ms-project { font-size: 11.5px; color: var(--text-dimmer); margin-top: 2px; }
    .ms-tag { font-family:var(--mono); font-size: 9.5px; font-weight: 700; padding: 2px 8px; border-radius: 999px; background: rgba(176,73,47,0.18); color: #96402A; flex-shrink: 0; align-self: flex-start; text-transform:uppercase; }
    .ms-done-tag { background: rgba(74,122,92,0.12); color: #3F6B4C; }
    .ms-done .ms-event { text-decoration: line-through; color: var(--text-dimmer); }
    .donut-chart { display: flex; justify-content: center; margin: 6px 0 14px; cursor:pointer; }
    .donut-svg { width: 150px; height: 150px; max-width: 100%; }
    .donut-svg circle[stroke-dasharray] { stroke-dasharray: 0 212; transition: stroke-dasharray 1.2s var(--ease) .2s; }
    .donut-num { font-family:var(--display); font-size: 21px; fill: var(--text); font-weight: 700; }
    .donut-label { font-family:var(--mono); font-size: 8.5px; fill: var(--text-dimmer); text-transform: uppercase; letter-spacing: 0.06em; }
    .legend-list { display: flex; flex-direction: column; gap: 9px; padding: 0; margin: 0; }
    .legend-item { display: flex; align-items: center; gap: 9px; padding: 4px 6px; border-radius: 8px; cursor:pointer; }
    .legend-item:hover { background: rgba(232,163,61,0.05); }
    .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .legend-label { flex: 1; font-size: 12.5px; color: var(--text-dim); }
    .legend-count { font-family:var(--mono); font-size: 12.5px; font-weight: 700; }
    .btn-outline {
      background: none; border: 1px solid var(--border); color: var(--text-dim);
      padding: 7px 14px; border-radius: 999px; font-family:var(--mono); font-size: 11.5px; font-weight: 700; letter-spacing:.02em;
      transition: all .2s ease; cursor:pointer;
    }

              <circle cx="60" cy="60" r="48" fill="none" stroke="#C6862A" stroke-width="16" stroke-dasharray="62 212" stroke-dashoffset="0" stroke-linecap="round" transform="rotate(-90 60 60)"/>
              <circle cx="60" cy="60" r="48" fill="none" stroke="#4A7A5C" stroke-width="16" stroke-dasharray="46 212" stroke-dashoffset="-62" stroke-linecap="round" transform="rotate(-90 60 60)"/>
              <circle cx="60" cy="60" r="48" fill="none" stroke="#3D5A73" stroke-width="16" stroke-dasharray="40 212" stroke-dashoffset="-108" stroke-linecap="round" transform="rotate(-90 60 60)"/>
              <circle cx="60" cy="60" r="48" fill="none" stroke="#B0492F" stroke-width="16" stroke-dasharray="34 212" stroke-dashoffset="-148" stroke-linecap="round" transform="rotate(-90 60 60)"/>
              <circle cx="60" cy="60" r="48" fill="none" stroke="#6B5B95" stroke-width="16" stroke-dasharray="30 212" stroke-dashoffset="-182" stroke-linecap="round" transform="rotate(-90 60 60)"/>
              <text x="60" y="56" text-anchor="middle" class="donut-num">5</text>
              <text x="60" y="68" text-anchor="middle" class="donut-label">Branches</text>
            </svg>
          </div>
          <ul class="legend-list">${legendHtml}</ul>
        </div>
      </section>
    `;
  }

  function renderRuns() {
    const statuses = ["All", "Active", "Ramping Up", "Review", "Completed"];
    const filtered = state.runFilter === "All" ? leaseContracts : leaseContracts.filter(e => e.status === state.runFilter);
    const stats = [
      { icon: "⊞", value: leaseContracts.length, label: "Total Leases" },
      { icon: "◉", value: leaseContracts.filter(e => e.status === "Active").length, label: "Active Now", accent: true },
      { icon: "▤", value: leaseContracts.filter(e => e.status === "Ramping Up").length, label: "Ramping Up" },
      { icon: "✓", value: leaseContracts.filter(e => e.status === "Completed").length, label: "Completed" }
    ];
    const statsHtml = stats.map((s, i) => {
      const bar = [100, 60, 40, 20][i];
      return `<div class="stat-card ${s.accent ? "stat-accent" : ""}" data-aos="fade-up" data-aos-delay="${i * 60}" onclick="go404()">
        <div class="stat-top"><span class="stat-icon">${s.icon}</span></div>
        <div class="stat-value">${s.value}</div><div class="stat-label">${s.label}</div>
        <div class="stat-bar"><div class="stat-bar-fill" data-w="${bar}"></div></div>
      </div>`;
    }).join("");

    const filterHtml = statuses.map(s =>
      `<button class="btn-outline run-filter-btn ${state.runFilter === s ? "btn-active" : ""}" data-filter="${s}">${s}</button>`
    ).join("");

    const rows = filtered.map(t =>
      `<tr onclick="go404()">
        <td><div class="t-name">${t.name}</div><div class="t-sub">${t.site}</div></td>
        <td>${regionTag(t.facility)}</td>
        <td class="type-col">${t.type}</td>
        <td><span class="status-badge ${statusColors[t.status]}">${t.status}</span></td>
        <td><div class="progress-wrap"><div class="progress-bar"><div class="progress-fill" data-w="${t.progress}"></div></div><span class="progress-pct">${t.progress}%</span></div></td>
        <td class="date-col" style="font-size:12px">${t.manager}</td>
        <td class="date-col">${t.endDate}</td>
        <td class="budget-col">${t.budget}</td>
      </tr>`
    ).join("");

    return `
      <section class="stats-grid">${statsHtml}</section>
      <div class="card" data-aos="fade-up" data-aos-delay="100">
        <div class="card-header"><div><h2 class="card-title">All Active Leases</h2><p class="card-sub">Full list of vehicle & equipment agreements</p></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">${filterHtml}</div></div>
        <div class="table-wrapper"><table class="runs-table"><thead><tr><th>Lease</th><th>Branch</th><th>Type</th><th>Status</th><th>Progress</th><th>Agent</th><th>Ends</th><th>Rate</th></tr></thead><tbody>${rows}</tbody></table></div>
      </div>
    `;
  }

  function renderTeams() {
    const stats = [
      { icon: "▤", value: fleetTeam.length, label: "Team Members", bar: 80, accent: true },
      { icon: "◉", value: fleetTeam.filter(m => m.status === "active").length, label: "Online Now", bar: 85 },
      { icon: "⊞", value: fleetTeam.reduce((a, m) => a + m.projects, 0), label: "Active Leases Managed", bar: 70 },
      { icon: "⊚", value: Math.round(fleetTeam.reduce((a, m) => a + m.experience, 0) / fleetTeam.length), label: "Avg. Yrs", bar: 75 }
    ];
    const statsHtml = stats.map((s, i) =>
      `<div class="stat-card ${s.accent ? "stat-accent" : ""}" data-aos="fade-up" data-aos-delay="${i * 60}" onclick="go404()">
        <div class="stat-top"><span class="stat-icon">${s.icon}</span></div>
        <div class="stat-value">${s.value}</div><div class="stat-label">${s.label}</div>
        <div class="stat-bar"><div class="stat-bar-fill" data-w="${s.bar}"></div></div>
      </div>`
    ).join("");

    const cards = fleetTeam.map((m, i) =>
      `<div class="team-card" data-aos="fade-up" data-aos-delay="${i * 30}" onclick="go404()">
        <div style="display:flex;align-items:center;gap:14px;margin-bottom:14px">
          <div class="member-avatar" style="width:46px;height:46px;font-size:14px">${m.avatar}<span class="online-dot dot-${m.status}"></span></div>
          <div><div class="member-name" style="font-size:15px">${m.name}</div><div class="member-role">${m.role}</div></div>
        </div>
        <div style="font-size:12.5px;color:var(--text-dim);line-height:1.9">
          <div>🎯 ${m.speciality}</div>
          <div>✉️ ${m.email}</div>
          <div>📂 ${m.projects} active lease${m.projects !== 1 ? "s" : ""} · ${m.experience} yrs</div>
        </div>
      </div>`
    ).join("");

    return `
      <section class="stats-grid">${statsHtml}</section>
      <div class="card" data-aos="fade-up" data-aos-delay="100">
        <div class="card-header"><div><h2 class="card-title">Fleet Team</h2><p class="card-sub">Leasing agents & fleet managers</p></div></div>
        <div class="team-grid">${cards}</div></div>
    `;
  }

  function renderReports() {
    const stats = [
      { icon: "◉", value: fleetReports.length, label: "Total Reports", bar: 80, accent: true },
      { icon: "✓", value: fleetReports.filter(p => p.status === "Published").length, label: "Published", bar: 70 },
      { icon: "◷", value: fleetReports.filter(p => p.status === "In Review").length, label: "In Review", bar: 20 },
      { icon: "◈", value: fleetReports.reduce((a, p) => a + p.reads, 0), label: "Total Views", bar: 60 }
    ];
    const statsHtml = stats.map((s, i) =>
      `<div class="stat-card ${s.accent ? "stat-accent" : ""}" data-aos="fade-up" data-aos-delay="${i * 60}" onclick="go404()">
        <div class="stat-top"><span class="stat-icon">${s.icon}</span></div>
        <div class="stat-value">${s.value}</div><div class="stat-label">${s.label}</div>
        <div class="stat-bar"><div class="stat-bar-fill" data-w="${s.bar}"></div></div>
      </div>`
    ).join("");

    const cards = fleetReports.map((p, i) =>
      `<div class="research-card" data-aos="fade-up" data-aos-delay="${i * 40}" onclick="go404()">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap">
          <div style="flex:1;min-width:180px">
            <div style="font-weight:700;color:#1B2430;font-size:14px;margin-bottom:4px">${p.title}</div>
            <div style="font-size:12.5px;color:var(--text-dim);margin-bottom:6px">Prepared by ${p.authors}</div>
            <div style="font-size:12px;color:var(--text-dimmer)">${p.journal} · ${p.year}</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0">
            <span style="background:${reportStatusColor[p.status]}22;color:${reportStatusColor[p.status]};border-radius:999px;padding:3px 10px;font-family:var(--mono);font-size:10.5px;font-weight:700;text-transform:uppercase">${p.status}</span>
            ${p.reads > 0 ? `<span style="font-size:12px;color:var(--text-dim)">📊 ${p.reads} views</span>` : ''}
          </div>
        </div>
      </div>`
    ).join("");

    return `
      <section class="stats-grid">${statsHtml}</section>
      <div class="card" data-aos="fade-up" data-aos-delay="100">
        <div class="card-header"><div><h2 class="card-title">Fleet Reports</h2><p class="card-sub">Utilization studies and performance briefs</p></div></div>
        <div style="display:flex;flex-direction:column;gap:14px">${cards}</div></div>
    `;
  }

  function renderSchedule() {
    const rows = scheduleEvents.map((ev, i) => {
      const parts = ev.date.split(" ");
      let tag = "";
      if (ev.type === "urgent") tag = `<span class="evt-tag" style="background:rgba(176,73,47,0.18);color:#96402A">Urgent</span>`;
      if (ev.type === "meeting") tag = `<span class="evt-tag" style="background:rgba(107,114,128,0.16);color:#6B7280">Meeting</span>`;
      return `<div class="schedule-row" data-aos="fade-up" data-aos-delay="${i * 30}" onclick="go404()">
        <div style="width:50px;flex-shrink:0;text-align:center">
          <div style="font-family:var(--mono);font-size:10px;font-weight:700;color:${scheduleTypeColor[ev.type]};text-transform:uppercase;letter-spacing:0.04em">${parts[0]}</div>
          <div style="font-family:var(--display);font-size:18px;color:#1B2430">${parts[1]}</div>
        </div>
        <div style="width:3px;align-self:stretch;border-radius:999px;background:${scheduleTypeColor[ev.type]};opacity:0.7;flex-shrink:0"></div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;color:#1B2430;font-size:13.5px">${ev.event}</div>
          <div style="font-size:12px;color:var(--text-dim);margin-top:3px">📍 ${ev.site}</div>
        </div>${tag}
      </div>`;
    }).join("");

    return `<div class="card" data-aos="fade-up" data-aos-delay="100">
      <div class="card-header"><div><h2 class="card-title">Schedule</h2><p class="card-sub">Inspections, pickups, and reviews</p></div></div>
      <div style="display:flex;flex-direction:column;gap:4px">${rows}</div></div>`;
  }

  function renderBudget() {
    const totalAllocated = budgetData.reduce((a, b) => a + b.allocated, 0);
    const totalSpent = budgetData.reduce((a, b) => a + b.spent, 0);
    const utilRate = Math.round((totalSpent / totalAllocated) * 100);
    const stats = [
      { icon: "⊟", value: fmt(totalAllocated), label: "Allocated", bar: 100, accent: true },
      { icon: "◉", value: fmt(totalSpent), label: "Spent", bar: utilRate },
      { icon: "✓", value: fmt(totalAllocated - totalSpent), label: "Remaining", bar: Math.round(((totalAllocated - totalSpent) / totalAllocated) * 100) },
      { icon: "◈", value: utilRate + "%", label: "Utilisation", bar: utilRate }
    ];
    const statsHtml = stats.map((s, i) =>
      `<div class="stat-card ${s.accent ? "stat-accent" : ""}" data-aos="fade-up" data-aos-delay="${i * 60}" onclick="go404()">
        <div class="stat-top"><span class="stat-icon">${s.icon}</span></div>
        <div class="stat-value" style="font-size:22px">${s.value}</div><div class="stat-label">${s.label}</div>
        <div class="stat-bar"><div class="stat-bar-fill" data-w="${s.bar}"></div></div>
      </div>`
    ).join("");

    const rows = budgetData.map((b, i) => {
      const pct = Math.round((b.spent / b.allocated) * 100);
      const barGrad = pct > 85 ? "linear-gradient(90deg,#B0492F,#96402A)" : "linear-gradient(90deg,#E8A33D,#F2C572)";
      return `<div data-aos="fade-up" data-aos-delay="${i * 40}" onclick="go404()" style="cursor:pointer">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:6px">
          <div><span style="font-weight:700;color:#1B2430;font-size:13.5px">${b.site}</span>
          <span class="region-tag" style="margin-left:10px;color:${branchAccents[b.facility]};border-color:${branchAccents[b.facility]};background:${branchAccents[b.facility]}22;font-size:10.5px">${b.facility}</span></div>
          <div style="text-align:right;font-size:12.5px;color:var(--text-dim)"><span style="color:#1B2430;font-weight:700;font-family:var(--mono)">${fmt(b.spent)}</span> / ${fmt(b.allocated)}
          <span style="margin-left:10px;color:${pct > 80 ? "#96402A" : "#C6862A"};font-weight:700;font-family:var(--mono)">${pct}%</span></div>
        </div>
        <div style="height:8px;background:rgba(27,36,48,0.06);border-radius:999px;overflow:hidden">
          <div class="progress-fill" data-w="${pct}" style="background:${barGrad};height:100%;transition-delay:.3s"></div>
        </div>
      </div>`;
    }).join('<div style="height:18px"></div>');

    return `
      <section class="stats-grid">${statsHtml}</section>
      <div class="card" data-aos="fade-up" data-aos-delay="100">
        <div class="card-header"><div><h2 class="card-title">Budget by Branch</h2><p class="card-sub">Allocation vs spend</p></div></div>
        <div>${rows}</div></div>
    `;
  }

  function renderSettings() {
    const s = state.settings;
    const displayName = currentUsername || currentEmail || "Signed out";
    const displayEmail = currentEmail || "No account signed in";
    return `
      <div class="card" data-aos="fade-up" data-aos-delay="100">
        <div class="card-header"><div><h2 class="card-title">Account</h2><p class="card-sub">Profile and session</p></div></div>
        <div style="display:flex;align-items:center;gap:18px;margin-bottom:20px;flex-wrap:wrap">
          <div style="width:64px;height:64px;border-radius:50%;border:2px solid rgba(232,163,61,0.45);background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:24px;text-transform:uppercase;flex-shrink:0">${currentInitial}</div>
          <div><div style="font-weight:700;color:#1B2430;font-size:16px;text-transform:capitalize">${displayName}</div>
          <div style="font-size:13px;color:var(--text-dim);margin-top:2px">${displayEmail}</div>
          <div style="font-family:var(--mono);font-size:12px;color:#C6862A;margin-top:4px">⚙️ ${currentUser ? (currentUser.role === 'admin' ? 'Admin' : 'Partner') : 'Not signed in'}</div></div>
        </div>
        <button class="btn-outline" style="border-color:#E8A33D;color:#C6862A" onclick="go404()">Edit Profile</button>
      </div>
      <div class="card" data-aos="fade-up" data-aos-delay="150">
        <div class="card-header"><div><h2 class="card-title">Preferences</h2><p class="card-sub">Notifications and display</p></div></div>
        <div>
          <div style="display:flex;justify-content:space-between;align-items:center;padding:18px 0;border-bottom:1px solid rgba(27,36,48,0.06)">
            <div><div style="font-weight:700;color:#1B2430;font-size:13.5px">Push Notifications</div><div style="font-size:12.5px;color:var(--text-dim);margin-top:2px">Lease & maintenance alerts</div></div>
            <div class="toggle-switch" data-toggle="notifications" style="background:${s.notifications ? '#E8A33D' : 'rgba(27,36,48,0.12)'}">
              <div class="toggle-knob" style="left:${s.notifications ? '20px' : '3px'}"></div>
            </div>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;padding:18px 0;border-bottom:1px solid rgba(27,36,48,0.06)">
            <div><div style="font-weight:700;color:#1B2430;font-size:13.5px">Weekly Digest</div><div style="font-size:12.5px;color:var(--text-dim);margin-top:2px">Summary every Monday</div></div>
            <div class="toggle-switch" data-toggle="emailDigest" style="background:${s.emailDigest ? '#E8A33D' : 'rgba(27,36,48,0.12)'}">
              <div class="toggle-knob" style="left:${s.emailDigest ? '20px' : '3px'}"></div>
            </div>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;padding:18px 0;border-bottom:1px solid rgba(27,36,48,0.06)">
            <div><div style="font-weight:700;color:#1B2430;font-size:13.5px">Dark Mode</div><div style="font-size:12.5px;color:var(--text-dim);margin-top:2px">Dark theme</div></div>
            <div class="toggle-switch" data-toggle="darkMode" style="background:${s.darkMode ? '#E8A33D' : 'rgba(27,36,48,0.12)'}">
              <div class="toggle-knob" style="left:${s.darkMode ? '20px' : '3px'}"></div>
            </div>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;padding-top:18px">
            <div><div style="font-weight:700;color:#1B2430;font-size:13.5px">Language</div><div style="font-size:12.5px;color:var(--text-dim);margin-top:2px">Interface language</div></div>
            <select class="pref-select" id="lang-select">${["English", "French", "Spanish", "Mandarin", "Portuguese"].map(l => `<option ${s.language === l ? "selected" : ""}>${l}</option>`).join("")}</select>
          </div>
        </div>
      </div>
      <div class="card" data-aos="fade-up" data-aos-delay="200">
        <div class="card-header"><div><h2 class="card-title">Session</h2><p class="card-sub">Sign out</p></div></div>
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px">
          <div style="font-size:12.5px;color:var(--text-dim)">Signed in as <strong style="color:#1B2430">${displayEmail}</strong>.</div>
          <button class="btn-outline" style="border-color:rgba(176,73,47,0.4);color:#96402A;flex-shrink:0" id="settings-logout-btn">⤍ Logout</button>
        </div>
      </div>
      <div class="card" data-aos="fade-up" data-aos-delay="250" style="border-color:rgba(176,73,47,0.25);">
        <div class="card-header"><div><h2 class="card-title">Danger Zone</h2><p class="card-sub">Irreversible actions</p></div></div>
        <div style="display:flex;gap:12px;flex-wrap:wrap">
          <button class="btn-outline" style="border-color:rgba(176,73,47,0.4);color:#96402A" onclick="go404()">Reset Password</button>
          <button class="btn-outline" style="border-color:rgba(176,73,47,0.4);color:#96402A" onclick="go404()">Delete Account</button>
        </div>
      </div>
    `;
  }

  const pageRenderers = {
    dashboard: renderDashboard,
    runs: renderRuns,
    teams: renderTeams,
    reports: renderReports,
    schedule: renderSchedule,
    budget: renderBudget,
    settings: renderSettings
  };

  // ─── NAVIGATION ───
  function renderNav() {
    const mainItems = navItems.slice(0, 2);
    const mgmtItems = navItems.slice(2);
    function itemHtml(item) {
      const badge = item.id === "runs" ? `<span class="nav-badge">${leaseContracts.length}</span>` : "";
      return `<button class="nav-item ${state.activeNav === item.id ? "nav-active" : ""}" data-nav="${item.id}">
        <span class="nav-icon">${item.icon}</span><span>${item.label}</span>${badge}</button>`;
    }
    document.getElementById("nav-main").innerHTML = mainItems.map(itemHtml).join("");
    document.getElementById("nav-management").innerHTML = mgmtItems.map(itemHtml).join("");
  }

  function renderPage() {
    const page = pageMap[state.activeNav];
    document.getElementById("page-title-text").textContent = page.title;
    document.getElementById("page-sub-text").textContent = page.sub;
    document.getElementById("content-area").innerHTML = pageRenderers[state.activeNav]();
    renderNav();
    const settingsLogoutBtn = document.getElementById("settings-logout-btn");
    if (settingsLogoutBtn) settingsLogoutBtn.addEventListener("click", logout);
    window.scrollTo({ top: 0, left: 0, behavior: "instant" });
    animateStatBars();
    initAOS();
  }

  function navigateTo(id) {
    state.activeNav = id;
    closeSidebar();
    closeTopbarUserMenu();
    renderPage();
  }

  function openSidebar() {
    document.getElementById("sidebar").classList.add("sidebar-open");
    document.getElementById("sidebar-overlay").classList.add("show");
  }
  function closeSidebar() {
    document.getElementById("sidebar").classList.remove("sidebar-open");
    document.getElementById("sidebar-overlay").classList.remove("show");
  }
  function closeTopbarUserMenu() {
    document.getElementById("topbar-user").classList.remove("open");
  }

  // ─── EVENT BINDING ───
  document.getElementById("hamburger-btn").addEventListener("click", openSidebar);
  document.getElementById("close-sidebar-btn").addEventListener("click", closeSidebar);
  document.getElementById("sidebar-overlay").addEventListener("click", closeSidebar);
  document.getElementById("notif-btn").addEventListener("click", go404);
  document.getElementById("logout-btn").addEventListener("click", logout);
  document.getElementById("topbar-logout-btn").addEventListener("click", logout);
  document.getElementById("topbar-user-btn").addEventListener("click", function(e) {
    e.stopPropagation();
    document.getElementById("topbar-user").classList.toggle("open");
  });
  document.addEventListener("click", closeTopbarUserMenu);

  document.addEventListener("click", function(e) {
    const navBtn = e.target.closest("[data-nav]");
    if (navBtn) { navigateTo(navBtn.getAttribute("data-nav")); return; }
    const filterBtn = e.target.closest(".run-filter-btn");
    if (filterBtn) { state.runFilter = filterBtn.getAttribute("data-filter"); renderPage(); return; }
    const toggle = e.target.closest("[data-toggle]");
    if (toggle) {
      const key = toggle.getAttribute("data-toggle");
      state.settings[key] = !state.settings[key];
      renderPage();
      return;
    }
  });

  document.addEventListener("change", function(e) {
    if (e.target && e.target.id === "lang-select") {
      state.settings.language = e.target.value;
    }
  });

  // ─── INIT ───
  paintUserChrome();
  renderPage();
</script>
</body>
</html>
