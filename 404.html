<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — Ironline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    /* ----- RESET & VARIABLES (shared with index.html) ----- */
    :root {
      --ink: #1B2430;
      --ink-soft: #2B3646;
      --steel: #3D5A73;
      --paper: #F2EFE9;
      --paper-dim: #E8E3D8;
      --amber: #E8A33D;
      --amber-dim: #C6862A;
      --slate: #6B7280;
      --green: #4A7A5C;
      --line: rgba(27, 36, 48, 0.14);
      --line-light: rgba(242, 239, 233, 0.16);
      --display: 'Space Grotesk', sans-serif;
      --body: 'Inter', sans-serif;
      --mono: 'IBM Plex Mono', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--paper);
      color: var(--ink);
      font-family: var(--body);
      font-size: 16px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    h1,h2,h3,h4 { font-family: var(--display); letter-spacing: -0.01em; }
    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }
    .wrap { max-width: 1180px; margin: 0 auto; padding: 0 32px; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 24px;
      border-radius: 3px;
      font-weight: 600;
      font-size: 14.5px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
      position: relative;
      overflow: hidden;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary { background: var(--amber); color: var(--ink); }
    .btn-primary:hover { background: var(--amber-dim); box-shadow: 0 8px 20px -6px rgba(232, 163, 61, 0.55); }
    .btn-primary::after {
      content: '';
      position: absolute;
      top: 0; left: -60%;
      width: 40%; height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.55), transparent);
      transform: skewX(-20deg);
      transition: left 0.6s ease;
    }
    .btn-primary:hover::after { left: 130%; }
    .btn-outline { border-color: var(--line); color: var(--ink); background: transparent; }
    .btn-outline:hover { border-color: var(--ink); }

    /* ----- AOS ANIMATION ENGINE ----- */
    [data-aos] {
      opacity: 0;
      transition-property: opacity, transform;
      transition-duration: var(--aos-duration, 600ms);
      transition-delay: var(--aos-delay, 0ms);
      transition-timing-function: cubic-bezier(0.16, 1, 0.3, 1);
      will-change: transform, opacity;
    }
    [data-aos="fade-up"] { transform: translateY(28px); }
    [data-aos="zoom-in"] { transform: scale(0.92); }
    [data-aos].aos-in { opacity: 1; transform: translate(0, 0) scale(1); }
    @media (prefers-reduced-motion: reduce) {
      [data-aos] { transition-duration: 1ms !important; transform: none !important; opacity: 1 !important; }
    }

    /* ----- HEADER ----- */
    header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: white;
      border-bottom: 1px solid var(--line);
    }
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 32px;
      max-width: 1180px;
      margin: 0 auto;
    }
    .logo { display: flex; align-items: center; cursor: pointer; }
    .logo img { height: 54px; width: auto; display: block; transition: transform 0.25s ease; }
    .logo:hover img { transform: rotate(-3deg) scale(1.04); }

    /* ----- 404 HERO ----- */
    .error-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 64px 0;
      position: relative;
      overflow: hidden;
      isolation: isolate;
    }
    .error-main::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 15% 20%, rgba(232, 163, 61, 0.10), transparent 40%),
        radial-gradient(circle at 85% 80%, rgba(61, 90, 115, 0.12), transparent 45%);
      z-index: -1;
    }
    .error-content {
      max-width: 620px;
      margin: 0 auto;
      padding: 0 32px;
      text-align: center;
    }
    .error-code {
      font-family: var(--mono);
      font-size: clamp(80px, 20vw, 160px);
      font-weight: 500;
      line-height: 1;
      color: var(--ink);
      letter-spacing: -0.03em;
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 0.05em;
    }
    .error-code .zero-icon {
      display: inline-flex;
      width: 0.62em;
      height: 0.62em;
      animation: spinSlow 9s linear infinite;
    }
    @keyframes spinSlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) { .error-code .zero-icon { animation: none; } }
    .error-eyebrow {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--amber-dim);
      display: block;
      margin-bottom: 14px;
    }
    .error-content h1 {
      font-size: clamp(22px, 4.5vw, 30px);
      margin: 22px 0 14px;
    }
    .error-content p {
      color: var(--slate);
      font-size: 15.5px;
      max-width: 460px;
      margin: 0 auto 34px;
    }
    .error-actions {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 36px;
    }
    .error-links {
      display: flex;
      gap: 22px;
      justify-content: center;
      flex-wrap: wrap;
      font-family: var(--mono);
      font-size: 12.5px;
    }
    .error-links a { color: var(--slate); position: relative; padding-bottom: 2px; }
    .error-links a::after {
      content: '';
      position: absolute;
      left: 0; bottom: -1px;
      width: 0; height: 1px;
      background: var(--amber-dim);
      transition: width 0.25s ease;
    }
    .error-links a:hover { color: var(--ink); }
    .error-links a:hover::after { width: 100%; }
    .error-links span { color: var(--line); }

    /* ----- FOOTER ----- */
    footer {
      background: var(--ink);
      color: #A9AFBB;
      padding: 40px 0;
      width: 100%;
    }
    .foot-inner {
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 14px;
    }
    .foot-inner p { font-size: 12.5px; color: #7B8291; }
    .foot-legal { display: flex; gap: 20px; flex-wrap: wrap; }
    .foot-legal a { font-size: 12.5px; color: #7B8291; transition: color 0.2s; }
    .foot-legal a:hover { color: var(--paper); }

    @media (max-width: 480px) {
      .wrap { padding: 0 18px; }
      .nav { padding: 12px 18px; }
      .logo img { height: 38px; }
      .btn { padding: 11px 18px; font-size: 13.5px; }
      .foot-inner { padding: 0 18px; justify-content: center; text-align: center; }
    }
  </style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header>
  <nav class="nav">
    <a href="index.html" class="logo">
      <img src="./assets/stacly_logo1.webp" alt="Ironline" />
    </a>
  </nav>
</header>

<!-- ===== 404 CONTENT ===== -->
<main class="error-main">
  <div class="error-content">
    <span class="error-eyebrow" data-aos="fade-up" data-aos-duration="500">Error 404</span>
    <div class="error-code" data-aos="zoom-in" data-aos-duration="600" data-aos-delay="80">
      4<svg class="zero-icon" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="17" cy="17" r="15" stroke="#E8A33D" stroke-width="2.4" stroke-dasharray="4 6" />
        </svg>4
    </div>
    <h1 data-aos="fade-up" data-aos-delay="150">This asset isn't in the yard.</h1>
    <p data-aos="fade-up" data-aos-delay="200">The page you're looking for was moved, renamed, or never existed. Head back to where you were, or start fresh from the homepage.</p>
    <div class="error-actions" data-aos="fade-up" data-aos-delay="250">
      <button type="button" class="btn btn-outline" id="backBtn">
        <i class="fa-solid fa-arrow-left" style="font-size:12px;"></i> Back
      </button>
      <a href="index.html" class="btn btn-primary">
        Go Home <i class="fa-solid fa-arrow-right" style="font-size:12px;"></i>
      </a>
    </div>
    <div class="error-links" data-aos="fade-up" data-aos-delay="300">
      <a href="fleet.html">Fleet</a><span>/</span>
      <a href="index.html#pricing">Pricing</a><span>/</span>
      <a href="index.html#footer">Contact</a>
    </div>
  </div>
</main>

<!-- ===== FOOTER ===== -->
<footer>
  <div class="foot-inner">
    <p>© 2026 STACKLY Rental &amp; Leasing. All rights reserved.</p>
    <div class="foot-legal">
      <a href="#">Privacy</a>
      <a href="#">Terms</a>
      <a href="#">Insurance requirements</a>
    </div>
  </div>
</footer>

<script>
  (function() {
    // AOS
    var items = document.querySelectorAll('[data-aos]');
    items.forEach(function(el) {
      var delay = el.getAttribute('data-aos-delay');
      var duration = el.getAttribute('data-aos-duration');
      if (delay) el.style.setProperty('--aos-delay', delay + 'ms');
      if (duration) el.style.setProperty('--aos-duration', duration + 'ms');
    });
    requestAnimationFrame(function() {
      items.forEach(function(el) { el.classList.add('aos-in'); });
    });

    // Back button: go to previous page, fall back to home if no history
    var backBtn = document.getElementById('backBtn');
    if (backBtn) {
      backBtn.addEventListener('click', function() {
        if (window.history.length > 1) {
          window.history.back();
        } else {
          window.location.href = 'index.html';
        }
      });
    }
  })();
</script>
</body>
</html>
