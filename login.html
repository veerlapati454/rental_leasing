<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Ironline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1B2430;
      --ink-soft: #2B3646;
      --steel: #3D5A73;
      --paper: #FFFFFF;
      --paper-dim: #F2EFE9;
      --amber: #E8A33D;
      --amber-dim: #C6862A;
      --slate: #6B7280;
      --green: #4A7A5C;
      --rust: #B0492F;
      --line: rgba(27, 36, 48, 0.12);
      --line-light: rgba(27, 36, 48, 0.08);
      --display: 'Space Grotesk', sans-serif;
      --body: 'Inter', sans-serif;
      --mono: 'IBM Plex Mono', monospace;
    }

    body {
      background: #FAFAF7;
      font-family: var(--body);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    /* --- Animated white-theme background --- */
    .bg-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .bg-grid {
      position: absolute;
      inset: -2px;
      background-image:
        repeating-linear-gradient(90deg, rgba(27,36,48,0.045) 0 1px, transparent 1px 90px),
        repeating-linear-gradient(0deg, rgba(27,36,48,0.045) 0 1px, transparent 1px 90px);
      animation: gridDrift 40s linear infinite;
    }
    @keyframes gridDrift {
      0% { transform: translate(0, 0); }
      100% { transform: translate(90px, 90px); }
    }
    .bg-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.55;
      will-change: transform;
    }
    .blob-1 {
      width: 480px; height: 480px;
      top: -140px; left: -120px;
      background: radial-gradient(circle at 30% 30%, rgba(232,163,61,0.35), rgba(232,163,61,0) 70%);
      animation: floatA 22s ease-in-out infinite;
    }
    .blob-2 {
      width: 560px; height: 560px;
      bottom: -180px; right: -160px;
      background: radial-gradient(circle at 60% 40%, rgba(61,90,115,0.28), rgba(61,90,115,0) 70%);
      animation: floatB 26s ease-in-out infinite;
    }
    .blob-3 {
      width: 360px; height: 360px;
      top: 40%; left: 60%;
      background: radial-gradient(circle at 50% 50%, rgba(74,122,92,0.22), rgba(74,122,92,0) 70%);
      animation: floatC 30s ease-in-out infinite;
    }
    @keyframes floatA {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(60px, 40px) scale(1.08); }
    }
    @keyframes floatB {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-50px, -30px) scale(1.06); }
    }
    @keyframes floatC {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-40px, 50px) scale(0.94); }
    }

    .bg-particles {
      position: absolute;
      inset: 0;
    }
    .particle {
      position: absolute;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--amber-dim);
      opacity: 0.35;
      animation: rise linear infinite;
    }
    @keyframes rise {
      0% { transform: translateY(0) translateX(0); opacity: 0; }
      10% { opacity: 0.45; }
      90% { opacity: 0.25; }
      100% { transform: translateY(-100vh) translateX(20px); opacity: 0; }
    }

    h1,h2,h3,h4 { font-family: var(--display); letter-spacing: -0.01em; }
    a { color: inherit; }

    .login-wrapper { width: 100%; max-width: 440px; position: relative; z-index: 1; }

    .back-home {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--slate);
      font-size: 0.86rem;
      font-family: var(--mono);
      transition: all 0.25s ease;
      text-decoration: none;
      padding: 8px 12px;
      border-radius: 3px;
      border: 1px solid transparent;
      margin-bottom: 14px;
      cursor: pointer;
    }
    .back-home:hover {
      color: var(--ink);
      border-color: var(--line);
      background: rgba(27,36,48,0.03);
      transform: translateX(-2px);
    }

    .login-container {
      background: var(--paper);
      color: var(--ink);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 44px 38px 36px;
      box-shadow: 0 30px 80px rgba(27, 36, 48, 0.12), 0 4px 20px rgba(27,36,48,0.06);
      position: relative;
      overflow: hidden;
    }
    .login-container::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--amber), var(--amber-dim));
    }

    .login-logo { text-align: center; margin-bottom: 30px; }
    .login-logo .logo-placeholder { display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }
    .login-logo .logo-placeholder img { max-width: 180px; height: auto; display: block; }
    .login-logo .logo-placeholder .logo-fallback {
      display: flex; align-items: center; justify-content: center;
      width: 76px; height: 76px; border-radius: 6px;
      background: rgba(232,163,61,0.12); border: 2px dashed var(--amber-dim);
      color: var(--amber-dim); font-size: 12px; font-family: var(--mono);
      text-align: center; line-height: 1.4; padding: 8px;
    }
    .login-logo .eyebrow { color: var(--amber-dim); }
    .login-logo p { color: var(--slate); font-size: 0.92rem; margin-top: 6px; }

    .role-selector {
      display: flex; gap: 10px; margin-bottom: 26px;
      background: var(--paper-dim); border-radius: 3px; padding: 4px;
      border: 1px solid var(--line);
    }
    .role-btn {
      flex: 1; padding: 10px 16px; border: none; border-radius: 3px;
      background: transparent; color: var(--slate);
      font-family: var(--body); font-size: 0.9rem; font-weight: 500;
      cursor: pointer; transition: all 0.25s ease; position: relative;
    }
    .role-btn.active { background: var(--ink); color: var(--paper); }
    .role-btn:hover:not(.active) { color: var(--ink); background: rgba(27,36,48,0.05); }
    .role-btn i { margin-right: 8px; }

    .form-group { margin-bottom: 18px; position: relative; }
    .form-group label {
      display: block; font-size: 0.78rem; font-weight: 500; color: var(--slate);
      margin-bottom: 7px; font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.05em;
    }
    .form-group .input-wrapper {
      position: relative; display: flex; align-items: center;
      background: #fff; border: 1px solid var(--line); border-radius: 3px;
      transition: all 0.25s ease;
    }
    .form-group .input-wrapper:focus-within {
      border-color: var(--amber-dim); box-shadow: 0 0 0 3px rgba(232,163,61,0.15);
    }
    .form-group .input-wrapper .input-icon { padding: 0 0 0 16px; color: var(--slate); font-size: 0.9rem; flex-shrink: 0; }
    .form-group .input-wrapper input {
      width: 100%; padding: 13px 16px 13px 12px; background: transparent; border: none;
      outline: none; color: var(--ink); font-size: 0.95rem; font-family: var(--body);
    }
    .form-group .input-wrapper input::placeholder { color: var(--slate); opacity: 0.7; }
    .form-group .input-wrapper .toggle-password {
      padding: 0 16px 0 0; color: var(--slate); cursor: pointer; transition: color 0.25s ease;
      flex-shrink: 0; background: transparent; border: none; font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
    }
    .form-group .input-wrapper .toggle-password:hover { color: var(--ink); }
    .form-group .input-wrapper .toggle-password:focus-visible { outline: 2px solid var(--amber-dim); border-radius: 4px; }
    .form-group .input-wrapper .toggle-password i { pointer-events: none; }

    .validation-msg { font-size: 0.78rem; color: var(--rust); margin-top: 6px; display: none; font-family: var(--mono); }
    .validation-msg.show { display: block; }

    .form-options { display: flex; justify-content: space-between; align-items: center; margin: 18px 0 24px; }
    .form-options .remember-me { display: flex; align-items: center; gap: 8px; color: var(--slate); font-size: 0.85rem; cursor: pointer; }
    .form-options .remember-me input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--amber-dim); cursor: pointer; }
    .form-options .forgot-password { color: var(--slate); font-size: 0.85rem; text-decoration: none; transition: color 0.25s ease; }
    .form-options .forgot-password:hover { color: var(--ink); }

    .login-btn {
      width: 100%; padding: 14px; border: none; border-radius: 3px;
      background: var(--amber); color: var(--ink); font-size: 1rem; font-weight: 600;
      font-family: var(--body); cursor: pointer; transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
      position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .login-btn::before {
      content: ''; position: absolute; top: 0; left: -60%; width: 40%; height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.55), transparent);
      transform: skewX(-20deg); transition: left 0.6s ease;
    }
    .login-btn:hover::before { left: 130%; }
    .login-btn:hover { background: var(--amber-dim); transform: translateY(-1px); box-shadow: 0 8px 20px -6px rgba(232,163,61,0.55); }
    .login-btn:active { transform: translateY(0); }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none !important; }

    .divider { display: flex; align-items: center; gap: 16px; margin: 24px 0; color: var(--slate); font-size: 0.78rem; font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.06em; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--line); }

    .create-account { text-align: center; margin-top: 8px; }
    .create-account p { color: var(--slate); font-size: 0.9rem; }
    .create-account a { color: var(--amber-dim); font-weight: 600; text-decoration: none; transition: color 0.25s ease; }
    .create-account a:hover { color: var(--ink); }

    .error-msg {
      background: rgba(176,73,47,0.08); border: 1px solid rgba(176,73,47,0.25); border-radius: 3px;
      padding: 10px 14px; color: var(--rust); font-size: 0.85rem; margin-bottom: 16px;
      display: none; align-items: center; gap: 10px; font-family: var(--mono);
    }
    .error-msg.show { display: flex; }
    .error-msg i { font-size: 1rem; }

    @media (max-width: 480px) {
      .login-wrapper { padding: 10px; }
      .login-container { padding: 32px 22px 26px; }
      .form-options { flex-direction: column; gap: 12px; align-items: flex-start; }
      .role-selector { flex-direction: row; }
      .back-home { font-size: 0.78rem; padding: 6px 10px; }
      .login-logo .logo-placeholder img { max-width: 140px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .bg-grid, .bg-blob, .particle { animation: none !important; }
    }

    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus,
    input:-webkit-autofill:active {
      -webkit-box-shadow: 0 0 0 1000px #fff inset !important;
      -webkit-text-fill-color: #1B2430 !important;
      border-color: var(--line);
      transition: background-color 5000s ease-in-out 0s;
    }
    input::-ms-clear, input::-ms-reveal { display: none; width: 0; height: 0; }
    input::-webkit-search-decoration, input::-webkit-search-cancel-button,
    input::-webkit-search-results-button, input::-webkit-search-results-decoration { display: none; }
  </style>
</head>
<body>

  <div class="bg-layer">
    <div class="bg-grid"></div>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="bg-blob blob-3"></div>
    <div class="bg-particles" id="bgParticles"></div>
  </div>

  <div class="login-wrapper">
    <a href="index.html" class="back-home">
      <i class="fas fa-arrow-left"></i> Back to Home
    </a>

    <div class="login-container">
      <div class="login-logo">
        <div class="logo-placeholder">
          <img
            id="logoImage"
            src="./assets/stacly_logo1.webp"
            alt="Ironline"
            onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='flex';"
          />
          <div id="logoFallback" class="logo-fallback" style="display:none;">
            <span>Iron<br />line</span>
          </div>
        </div>
        <span class="eyebrow" style="font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;">Account Access</span>
        <p>Sign in to manage your leases</p>
      </div>

      <div class="role-selector">
        <button class="role-btn active" data-role="user" id="userRole">
          <i class="fas fa-user"></i> User
        </button>
        <button class="role-btn" data-role="admin" id="adminRole">
          <i class="fas fa-user-shield"></i> Admin
        </button>
      </div>

      <div class="error-msg" id="errorMsg">
        <i class="fas fa-exclamation-circle"></i>
        <span id="errorText">Invalid credentials. Please try again.</span>
      </div>

      <form id="loginForm" autocomplete="off">
        <div class="form-group">
          <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
          <div class="input-wrapper">
            <span class="input-icon"><i class="fas fa-envelope"></i></span>
            <input
              type="email"
              id="email"
              placeholder="Enter your Gmail address"
              required
              autocomplete="email"
            />
          </div>
          <div class="validation-msg" id="emailValidation">
            <i class="fas fa-info-circle"></i> Please enter a valid Gmail address (@gmail.com)
          </div>
        </div>

        <div class="form-group">
          <label for="password"><i class="fas fa-lock"></i> Password</label>
          <div class="input-wrapper">
            <span class="input-icon"><i class="fas fa-lock"></i></span>
            <input
              type="password"
              id="password"
              placeholder="Enter your password"
              required
              autocomplete="current-password"
            />
            <button type="button" class="toggle-password" id="togglePassword" aria-label="Toggle password visibility">
              <i class="fas fa-eye" id="toggleIcon"></i>
            </button>
          </div>
        </div>

        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox" /> Remember me
          </label>
          <a href="404.html" class="forgot-password">Forgot password?</a>
        </div>

        <button type="submit" class="login-btn" id="loginBtn">
          <i class="fas fa-sign-in-alt"></i> Sign In
        </button>
      </form>

      <div class="divider">or</div>

      <div class="create-account">
        <p>Don't have an account? <a href="signup.html">Create one now</a></p>
      </div>
    </div>
  </div>

  <script>
    (function() {
      'use strict';

      // --- Generate floating particles for background ---
      const particleContainer = document.getElementById('bgParticles');
      const particleCount = 18;
      for (let i = 0; i < particleCount; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const left = Math.random() * 100;
        const size = 3 + Math.random() * 4;
        const duration = 14 + Math.random() * 16;
        const delay = Math.random() * 20;
        p.style.left = left + 'vw';
        p.style.bottom = '-10px';
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        p.style.animationDuration = duration + 's';
        p.style.animationDelay = delay + 's';
        particleContainer.appendChild(p);
      }

      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const togglePassword = document.getElementById('togglePassword');
      const toggleIcon = document.getElementById('toggleIcon');
      const loginForm = document.getElementById('loginForm');
      const loginBtn = document.getElementById('loginBtn');
      const errorMsg = document.getElementById('errorMsg');
      const errorText = document.getElementById('errorText');
      const emailValidation = document.getElementById('emailValidation');
      const userRoleBtn = document.getElementById('userRole');
      const adminRoleBtn = document.getElementById('adminRole');

      let selectedRole = 'user';
      let isPasswordVisible = false;

      // --- Role Selection ---
      function setRole(role) {
        selectedRole = role;
        [userRoleBtn, adminRoleBtn].forEach(btn => btn.classList.remove('active'));
        if (role === 'user') userRoleBtn.classList.add('active');
        else adminRoleBtn.classList.add('active');
        hideError();
        validateEmail();
      }

      userRoleBtn.addEventListener('click', () => setRole('user'));
      adminRoleBtn.addEventListener('click', () => setRole('admin'));

      // --- Email Validation (only Gmail) ---
      function validateEmail() {
        const email = emailInput.value.trim();
        const gmailRegex = /^[a-zA-Z0-9._%+-]+@gmail\.com$/;

        if (email.length > 0 && !gmailRegex.test(email)) {
          emailValidation.classList.add('show');
          return false;
        } else {
          emailValidation.classList.remove('show');
          return email.length > 0 && gmailRegex.test(email);
        }
      }

      emailInput.addEventListener('input', () => { validateEmail(); hideError(); });
      emailInput.addEventListener('blur', validateEmail);

      // --- Password Toggle ---
      togglePassword.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        isPasswordVisible = !isPasswordVisible;
        passwordInput.type = isPasswordVisible ? 'text' : 'password';
        toggleIcon.className = isPasswordVisible ? 'fas fa-eye-slash' : 'fas fa-eye';
        passwordInput.focus();
      });

      togglePassword.addEventListener('mousedown', (e) => e.preventDefault());

      // --- Error handling ---
      function showError(message) {
        errorText.textContent = message || 'Invalid credentials. Please try again.';
        errorMsg.classList.add('show');
      }

      function hideError() {
        errorMsg.classList.remove('show');
      }

      // --- Direct navigation without loading delay ---
      function redirectToDashboard() {
        const email = emailInput.value.trim();
        const redirectUrl = (selectedRole === 'admin') ? 'admindashboard.html' : 'dashboard.html';

        const userData = {
          email: email,
          role: selectedRole,
          name: email.split('@')[0]
        };

        localStorage.setItem('user', JSON.stringify(userData));
        localStorage.setItem('isAuthenticated', 'true');
        localStorage.setItem('userRole', selectedRole);
        localStorage.setItem('userEmail', email);

        window.location.replace(redirectUrl);
      }

      // --- Login handler ---
      function handleLogin(e) {
        e.preventDefault();
        const email = emailInput.value.trim();
        const password = passwordInput.value.trim();
        const gmailRegex = /^[a-zA-Z0-9._%+-]+@gmail\.com$/;

        if (!gmailRegex.test(email)) {
          showError('Please enter a valid Gmail address (@gmail.com)');
          emailInput.focus();
          return;
        }

        if (password.length < 4) {
          showError('Password must be at least 4 characters');
          passwordInput.focus();
          return;
        }

        redirectToDashboard();
      }

      loginForm.addEventListener('submit', handleLogin);

      passwordInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          loginForm.dispatchEvent(new Event('submit'));
        }
      });

      emailInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          passwordInput.focus();
        }
      });

      // --- Init ---
      setRole('user');
      hideError();
    })();
  </script>

</body>
</html>
